<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grade</title>
</head>
<body>
    
    <h1>Student Grade System</h1>
<script>
    let num = prompt("Enter your marks");
if(num >= 90){
    document.write("grade A");
}
else if ( num >= 75){
    document.write("grade B")
}
else if ( num >= 60){
    document.write("grade C")
}
</script>
</body>
</html>
