<!DOCTYPE html>
<html>
<head>
    <title>Even Odd Checker</title>
    <style>
        body {
            text-align: center;
            background-color: lightblue;
            font-family: Arial, sans-serif;
            margin-top: 100px;
        }

        #even {
            font-size: 24px;
            color: darkblue;
            font-weight: bold;
             width: 300px;
            margin: 20px auto;
            padding: 15px;
            border: 2px solid black;
            background-color: white;
            font-size: 24px;
            font-weight: bold;
            border-radius: 10px;
        }
    </style>
</head>
</head>
<body>

<script>
    let num = prompt("Enter a number");

    if(num % 2 == 0)
        document.write("Even Number");
    else
        document.write("Odd Number");
</script>


</body>
</html>
