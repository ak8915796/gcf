<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUmber checker</title>
    <style>
         body {
            text-align: center;
            background-color: rgb(208, 209, 205);
            font-family: Arial, sans-serif;
            margin-top: 100px;
        }


    </style>
</head>
<body>
    <div class="div">
        <h2>Enter the number:</h2>
        <p id="num"></p>
    <script>
    let num = prompt("Enter a number");

    if(num > 0)
        document.write("Postive Number");
    else
        document.write("Negative Number");
</script>
</div>
</body>
</html>
